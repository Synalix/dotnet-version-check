name: '.NET Version Check'
description: 'Verifies that the InformationalVersion in a .csproj file matches the GitHub Release tag.'
author: 'Synalix'

inputs:
  csproj_path:
    description: 'Path to the .csproj file (e.g. src/MyApp/MyApp.csproj)'
    required: true

branding:
  icon: 'check-circle'
  color: 'purple'

runs:
  using: 'node24'
  main: 'index.js'